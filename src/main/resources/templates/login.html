<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connexion - TP 10</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 5px;
        }
        .student-name {
            text-align: center;
            color: #764ba2;
            margin-bottom: 30px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #764ba2;
        }
        .error {
            color: #dc3545;
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8d7da;
            border-radius: 5px;
        }
        .success-msg {
            color: #28a745;
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #d4edda;
            border-radius: 5px;
        }
        .info {
            margin-top: 20px;
            font-size: 12px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }
        .info strong {
            color: #667eea;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔐 Connexion</h2>
    <div class="student-name">Malak NAIT HADDOU - TP 10</div>

    <div th:if="${param.error}" class="error">
        ❌ Identifiants incorrects
    </div>
    <div th:if="${param.logout}" class="success-msg">
        ✅ Déconnexion réussie
    </div>

    <form method="post" action="/security-app/login">
        <input type="text" name="username" placeholder="Nom d'utilisateur" required autofocus>
        <input type="password" name="password" placeholder="Mot de passe" required>
        <button type="submit">Se connecter</button>
    </form>

    <div class="info">
        <strong>📋 Comptes de test :</strong><br>
        <strong>malak.nait</strong> / member123 (Utilisateur)<br>
        <strong>malak.admin</strong> / admin123 (Administrateur)
    </div>
</div>
</body>
</html>
