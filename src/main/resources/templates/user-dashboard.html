<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Espace - Utilisateur</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .info-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
        }

        .info-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-label {
            font-weight: bold;
            width: 150px;
            color: #555;
        }

        .info-value {
            color: #333;
        }

        .btn-back {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            transition: background 0.3s;
        }

        .btn-back:hover {
            background: #764ba2;
        }

        .badge {
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>👤 Mon Espace Personnel</h1>
    <p>TP 10 - Spring Security | <strong>Malak NAIT HADDOU</strong></p>

    <div class="info-card">
        <div class="info-row">
            <div class="info-label">📧 Email :</div>
            <div class="info-value" th:text="${userEmail}"></div>
        </div>
        <div class="info-row">
            <div class="info-label">🔑 Rôles :</div>
            <div class="info-value" th:text="${userRoles}"></div>
        </div>
        <div class="info-row">
            <div class="info-label">🕐 Dernière connexion :</div>
            <div class="info-value" th:text="${lastConnection}"></div>
        </div>
        <div class="info-row">
            <div class="info-label">⏰ Heure d'accès :</div>
            <div class="info-value" th:text="${accessTime}"></div>
        </div>
    </div>

    <div style="text-align: center;">
        <span class="badge">✅ Authentification réussie</span>
        <span class="badge" style="background: #6b7280;">🎓 Étudiante: Malak NAIT HADDOU</span>
    </div>

    <div style="margin-top: 30px;">
        <a href="/home" class="btn-back">← Retour à l'accueil</a>
    </div>
</div>
</body>
</html>
